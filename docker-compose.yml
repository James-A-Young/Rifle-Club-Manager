services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shootingmatch
      POSTGRES_PASSWORD: shootingmatch
      POSTGRES_DB: shootingmatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shootingmatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://shootingmatch:shootingmatch@db:5432/shootingmatch
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://shootingmatch:shootingmatch@db:5432/shootingmatch
      JWT_SECRET: change-me-in-production
      NODE_ENV: production
      PORT: 3000
    depends_on:
      migrator:
        condition: service_completed_successfully

  backup-worker:
    build:
      context: .
      target: backup-worker
    environment:
      DATABASE_URL: ******db:5432/shootingmatch
      NODE_ENV: production
      GOOGLE_DRIVE_OAUTH_CLIENT_ID: ${GOOGLE_DRIVE_OAUTH_CLIENT_ID:-}
      GOOGLE_DRIVE_OAUTH_CLIENT_SECRET: ${GOOGLE_DRIVE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_DRIVE_OAUTH_REDIRECT_URI: ${GOOGLE_DRIVE_OAUTH_REDIRECT_URI:-}
      GOOGLE_DRIVE_TOKEN_ENCRYPTION_KEY: ${GOOGLE_DRIVE_TOKEN_ENCRYPTION_KEY:-}
      BACKUP_SCHEDULE_HOUR_UTC: ${BACKUP_SCHEDULE_HOUR_UTC:-2}
      BACKUP_SCHEDULE_JITTER_MS: ${BACKUP_SCHEDULE_JITTER_MS:-300000}
      BACKUP_WORKER_CONCURRENCY: ${BACKUP_WORKER_CONCURRENCY:-2}
      BACKUP_RUN_ON_STARTUP: ${BACKUP_RUN_ON_STARTUP:-false}
    depends_on:
      migrator:
        condition: service_completed_successfully

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
        PGADMIN_DEFAULT_EMAIL: admin@shootingmatch.app
        PGADMIN_DEFAULT_PASSWORD: admin
    ports:
        - "8080:80"
    depends_on:
        db:
          condition: service_healthy

volumes:
  postgres_data:
