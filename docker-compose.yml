version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shootingmatch
      POSTGRES_PASSWORD: shootingmatch
      POSTGRES_DB: shootingmatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shootingmatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://shootingmatch:shootingmatch@db:5432/shootingmatch
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://shootingmatch:shootingmatch@db:5432/shootingmatch
      JWT_SECRET: change-me-in-production
      NODE_ENV: production
      PORT: 3000
    depends_on:
      migrator:
        condition: service_completed_successfully

volumes:
  postgres_data:
