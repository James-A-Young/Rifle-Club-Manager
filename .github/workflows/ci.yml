name: CI

on:
  pull_request:
  push:
    branches:
      - '**'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend unit tests
        run: npm run test:server:unit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shootingmatch
          POSTGRES_PASSWORD: shootingmatch
          POSTGRES_DB: shootingmatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shootingmatch"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://shootingmatch:shootingmatch@localhost:5432/shootingmatch_test
      JWT_SECRET: test-secret-for-ci-integration-tests-do-not-use-in-prod
      CLIENT_ORIGIN: http://localhost:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run migrations
        run: npm run db:migrate

      - name: Run backend integration tests
        run: npm run test:server:integration

      - name: Run backend coverage (unit + integration)
        run: npm run test:server:coverage

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: server/coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build

      - name: Build production docker image
        run: docker build -t rifle-club-manager:ci .
